name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Security audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true  # don't fail build on audit issues for now (alert only)

      - name: Coverage report
        run: pnpm --filter @skillscraft/core test --coverage
        continue-on-error: true  # don't fail build on coverage for now (just generate)

