name: Bug Report
description: Report a bug in the framework
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what happened
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Package version (e.g., 0.9.1)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: dropdown
    id: node
    attributes:
      label: Node.js version
      options:
        - "20"
        - "22"
        - "24"
    validations:
      required: true
